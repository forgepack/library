# ╔══════════════════════════════════════════════╗
# ║                Configuration                 ║
# ╚══════════════════════════════════════════════╝
spring.application.name=library
application.cors=http://localhost:5173

forgepack.cache.ttl=1h
forgepack.cache.maximum-size=5000
forgepack.cache.initial-capacity=100

forgepack.rate-limit.requests-per-minute=100
forgepack.rate-limit.burst-multiplier=2
forgepack.rate-limit.cleanup-interval-minutes=15
forgepack.rate-limit.cleanup-threshold-multiplier=2
forgepack.rate-limit.trust-forwarded-for=false